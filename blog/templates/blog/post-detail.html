{% extends "base.html" %}
{% load static %}

{% block page_title %}
    Post - {{ post.title }}
{% endblock %}

{% block css_styles %}
    <link rel="stylesheet" href="{% static 'blog/index.css' %}">
    <link rel="stylesheet" href="{% static 'blog/post-detail.css' %}">
{% endblock %}

{% block page_content %}
    <section id="summary">
        <h2>
            {{ post.title }}
        </h2>
        <article>
            <img src="{% static 'blog/images/'|add:post.image %}" alt="{{ post.title }}" />
            <address>{{ post.author|title }}</address>
            <div>
                Last updated on <time> {{ post.date|date:"d M Y" }}</time>
            </div>
        </article>
    </section>
    <main>
        {{ post.content|safe }}
    </main>
{% endblock %}
