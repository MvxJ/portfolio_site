{% extends "base.html" %}
{% load static %}

{% block page_title %}
    My blog
{% endblock %}

{% block css_styles %}
    <link rel="stylesheet" href="{% static 'blog/all-posts.css' %}" />
    <link rel="stylesheet" href="{% static 'blog/post.css' %}">
{% endblock %}

{% block page_content %}
<section id="all-posts">
    <h2>My posts</h2>
    <ul>
        {% for post in posts %}
            {% include "blog/includes/post.html" %}
        {% endfor %}
    </ul>
</section>
{% endblock %}
